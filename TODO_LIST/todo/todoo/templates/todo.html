{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo</title>

<link rel="stylesheet" href="{% static 'css/styles.css' %}">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap">

<script src="https://kit.fontawesome.com/cb792c0850.js" crossorigin="anonymous"></script>

<style>

body{
background:#0f1f37;
font-family:Poppins;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:500px;
background:#ffffff30;
padding:25px;
border-radius:20px;
box-shadow:0 0 10px rgba(255,255,255,0.4);
}

h1{
text-align:center;
color:white;
}

form{
margin-top:20px;
}

input[type="text"]{
width:94%;
padding:15px;
border-radius:10px;
border:none;
background:#ffffff30;
color:white;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:#252525;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.todo{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
margin-top:15px;
border-radius:8px;
color:white;
}

.todo-red{
background:#ff1e1e;
}

.todo-green{
background:#0f8a0f;
}

.todo a{
color:white;
text-decoration:none;
}

.completed{
text-decoration:line-through;
opacity:0.8;
}

.icons i{
margin-left:10px;
cursor:pointer;

}
.icons i:hover{
    color: yellow;
}
.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logouticon{
color:white;
font-size:22px;
text-decoration:none;
margin-left: 465px;
}

.logouticon i:hover{
color:#ff4d4d;
transform:scale(1.2);
transition:0.3s;
}

</style>
</head>


<body>

<div class="container">
    <div>
    
    <a  href="{% url 'signout' %}" class="logouticon">
    <i class="fa-solid fa-right-from-bracket"></i><h1>Halo,{{ user.username }}!</h1>
        </a>

        
    </div>

<h1>Get Things Done?</h1>

<form method="POST">
{% csrf_token %}

<input type="text" name="title" placeholder="What is the task today?" required>

<button type="submit">Add Task</button>

</form>


{% for todo in res %}

<div class="todo {% if todo.status %}todo-green{% else %}todo-red{% endif %}">

<a href="{% url 'toggle' todo.srno %}">
<span class="{% if todo.status %}completed{% endif %}">
{{todo.title}}
</span>
</a>

<div class="icons">

<a href="/edit_todo/{{todo.srno}}">
<i class="fa-solid fa-pen-to-square"></i>
</a>

<a href="/delete_todo/{{todo.srno}}">
<i class="fa-solid fa-trash"></i>
</a>

</div>

</div>

{% endfor %}

</div>

</body>
</html>
